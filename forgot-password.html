<!DOCTYPE html><html lang="en" dir="ltr"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Forgot Password — Milk Matsuri</title><link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🥛</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"><link rel="stylesheet" href="style.css">
</head><body>
<header class="header" id="header"><div class="container nav-inner"><a href="index.html" class="logo"><span class="logo-icon">🥛</span><span class="logo-text">Milk <span class="accent">Matsuri</span></span></a><div class="nav-actions"><a href="index.html" class="btn btn-sm" style="background:var(--accent);color:#fff">← Home</a></div></div></header>
<section style="padding:calc(var(--header-height)+40px) 20px 80px;max-width:500px;margin:0 auto;text-align:center">
<div style="background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:40px;margin-top:60px">
<div style="font-size:2.5rem;margin-bottom:12px">🔑</div>
<h1 style="font-family:Poppins,sans-serif;font-size:1.6rem;font-weight:800;margin-bottom:8px">Forgot Password?</h1>
<p style="color:var(--text-secondary);margin-bottom:24px;font-size:0.9rem">Enter your email and we'll send you instructions to reset your password.</p>
<form onsubmit="handleReset(event)">
<div style="margin-bottom:16px;text-align:left"><label style="display:block;font-weight:700;margin-bottom:6px;font-size:0.85rem">Email</label><input type="email" required placeholder="your@email.com" style="width:100%;padding:12px;background:var(--bg-primary);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-primary);font-family:inherit;font-size:0.95rem"></div>
<button type="submit" style="width:100%;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-full);font-family:inherit;font-size:1rem;font-weight:700;cursor:pointer">📧 Send Reset Link</button>
<p id="resetMsg" style="margin-top:16px;font-weight:700;font-size:0.85rem;min-height:20px"></p>
</form>
<a href="admin.html" style="display:block;margin-top:20px;color:var(--text-muted);font-size:0.85rem">← Back to Login</a>
</div></section>
<footer class="footer"><div class="container"><div class="footer-bottom"><p>&copy; 2026 Milk Matsuri. All rights reserved. 🥛🎌</p></div></div></footer>
<script>
document.addEventListener('DOMContentLoaded',()=>{const s=localStorage.getItem('mm_theme'),d=s?s==='dark':window.matchMedia('(prefers-color-scheme:dark)').matches;document.documentElement.setAttribute('data-theme',d?'dark':'light')});
function handleReset(e){e.preventDefault();document.getElementById('resetMsg').innerHTML='<span style="color:#27ae60">✅ If this email exists, you\'ll receive reset instructions shortly.</span>';}
</script>
</body></html>
